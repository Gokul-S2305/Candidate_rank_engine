# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  "Multi-stage AI candidate ranking engine with deterministic scoring and evidence-based reasoning. Eight scoring engines evaluate each candidate across Talent DNA (technical expertise, execution, trust, professionalism, adaptability, innovation, communication, and risk), verified skill alignment, experience, behavioral signals, availability, and profile completeness. A Skill Truth Verification module cross-validates claimed skills using career history, assessments, endorsements, certifications, and proficiency consistency, reducing keyword stuffing and rewarding demonstrated expertise. A dual-layer Risk Intelligence engine combines hard disqualification rules with behavioral anomaly detection to eliminate impossible or suspicious profiles before ranking. An independent Decision Confidence engine measures the reliability of each recommendation based on signal quality and evidence consistency. Final scores are computed using a weighted scoring model with reachability and risk multipliers, producing transparent, reproducible rankings. Every recommendation includes candidate-specific reasoning generated exclusively from verified profile data, ensuring explainability without inferred skills, experience, or achievements. The complete pipeline ranks 100,000 candidates in approximately 57 seconds on a CPU, requires no external APIs or GPUs, and delivers scalable, reproducible, and enterprise-ready candidate recommendations."
